<!doctype html>
<html lang="zh-Hant">
<meta charset="utf-8">
<title>赤壁配樂選曲記錄 — AI 代聽海選</title>
<style>
  :root{--ink:#11141a;--panel:#1a1f29;--gold:#c9a35c;--paper:#e8e0cf;--dim:#8a8473;--line:#333a48}
  body{background:var(--ink);color:var(--paper);font:15px/1.6 "Noto Sans TC",sans-serif;max-width:1000px;margin:0 auto;padding:28px 18px 80px}
  h1{font-family:"Noto Serif TC",serif;color:var(--gold);letter-spacing:6px}
  h2{color:var(--gold);border-bottom:1px solid var(--line);padding-bottom:6px;margin-top:44px;letter-spacing:3px}
  .mood{color:var(--dim);font-size:13px;margin:-4px 0 14px}
  .cand{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px 16px;margin:10px 0}
  .cand.maybe{opacity:.62}
  .head{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap}
  .fit{font-weight:700;color:var(--gold)}
  .name{font-weight:700}
  .meta{color:var(--dim);font-size:12.5px}
  .note{font-size:13px;color:#b9b29e;margin:6px 0}
  audio{width:100%;height:34px;margin-top:6px}
  a{color:#7fa6d9}
  .pick{margin-left:auto;font-size:13px;color:var(--gold);border:1px solid var(--gold);border-radius:4px;padding:1px 10px}
  .tip{background:#23282f;border-left:3px solid var(--gold);padding:10px 14px;font-size:13.5px;color:#cfc8b4}
</style>
<h1>赤壁配樂選曲記錄</h1>
<p class="tip">本頁是赤壁 3D 配樂的海選記錄:以 Freesound API 撈 CC0 候選曲,由 Gemini 2.5-flash「代聽」並依固定清單評分
(樂器/節奏/有無人聲/時代違和/可否循環/適配分),入圍後由人耳終審。灰色為 AI 認為次佳(maybe)的候選。
音檔直接串流自 Freesound 官方 preview,每首均為 CC0 授權。</p>
<div id="app">載入中…</div>
<script>
const SLOTS = [
  ...Array.from({length:9},(_,i)=>`scene${i+1}`), 'battlecry', 'chains'
];
const TITLES = {
  scene1:'第一幕 大軍南下 — 沉重行軍鼓+低音 drone',
  scene2:'第二幕 孫劉同盟 — 箏/簫對話,廟堂縱橫',
  scene3:'第三幕 初戰赤壁 — 緊張弦樂+鼓點',
  scene4:'第四幕 鐵索連環 — 低迴 drone+金屬',
  scene5:'第五幕 苦肉計 — 黃昏孤簫',
  scene6:'第六幕 東風驟起 — 風聲漸強+爬升',
  scene7:'第七幕 火燒赤壁 — 全編制高潮',
  scene8:'第八幕 敗走華容 — 殘破慢板',
  scene9:'終幕 天下三分 — 開闊收束',
  battlecry:'音效:將士吶喊(三、七幕)',
  chains:'音效:鐵索(四幕,合成版不滿意才需要)',
};
(async()=>{
  const app=document.getElementById('app');app.innerHTML='';
  for(const slot of SLOTS){
    const h=document.createElement('h2');h.textContent=TITLES[slot]||slot;app.appendChild(h);
    let rep=null;
    try{rep=await (await fetch(`audio-work/reports/${slot}.json`)).json();}catch(e){}
    if(!rep){app.insertAdjacentHTML('beforeend','<p class="mood">(海選還沒跑到這格,稍後重新整理)</p>');continue;}
    const sorted=rep.filter(c=>c.verdict!=='reject')
      .sort((a,b)=>(b.verdict==='shortlist')-(a.verdict==='shortlist')||b.audition.fit-a.audition.fit);
    if(!sorted.length){app.insertAdjacentHTML('beforeend','<p class="mood">(無入圍——此幕將用 Web Audio 合成)</p>');continue;}
    for(const c of sorted){
      const a=c.audition;
      app.insertAdjacentHTML('beforeend',`
      <div class="cand ${c.verdict}">
        <div class="head">
          <span class="fit">${a.fit}/10</span>
          <span class="name">${c.name}</span>
          <span class="meta">${Math.round(c.dur)}s・${c.by}・CC0・<a href="${c.src}" target="_blank">Freesound #${c.id}</a></span>
          <span class="pick">選 ${c.id}</span>
        </div>
        <div class="note">${a.instruments}<br>${a.energy} — ${a.reason}${a.vocals?'<br>含人聲:'+(a.vocal_detail||''):''}</div>
        <audio controls preload="none" src="${c.preview||('audio-work/candidates/'+c.file)}"></audio>
      </div>`);
    }
  }
})();
</script>
</html>
